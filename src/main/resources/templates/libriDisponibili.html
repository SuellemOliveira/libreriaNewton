<!doctype html>
<html lang="en" dir="ltr" xmlns:th="https://www.thymeleaf.com">
  <head>
   
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">

    <title>Libreria Newton</title>
    <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin= "anonymous"></script>
    
    <style>
      body {
      
        background-image: url('images/N.png'); 
        
       
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
       
        background-color: #f4eae1; 
      }

     
    </style>
    
  </head>
  <body>
    
  </head>
  <body>
  
  <nav class="navbar navbar-expand-lg" style="background-color: #C5A059; color: #6f42c1;" dir="ltr">
  <div class="container-fluid">
    <a class="navbar-brand" style="color: #3d2514; font-weight: bold;" href="#">Libreria Newton</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" style="color: #3d2514;" aria-current="page" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" style="color: #3d2514;" href="libri_disponibili">Libri Disponibili</a>
        
      </ul>
    <div>
            <a class="nav-link" style="color: #3d2514;" href="aggiungere_libro">Aggiungere Libro</a>
    </div>
    </div>
  </div>
</nav>
  
       <div class="container my-5 col-md-6">
       
       <table class="table">
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Nome</th>
      <th scope="col">Autore</th>
      <th scope="col">Prezzo</th>
       <th scope="col">Azione</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="b:${book}">
      <td th:text="${b.id}"></td>
      <td th:text="${b.nome}"></td>
      <td th:text="${b.autore}"></td>
      <td th:text="${b.prezzo}"></td>
      <td> <a style="color:#3d2514" th:href="@{deleteList/{id} (id=${b.id})}"> 
      <i class="fa-solid fa-trash"></i> </a>
      <a style="color:#3d2514" th:href="@{/libroEdit/{id} (id=${b.id})}"> <i class="fa-solid fa-pen-to-square"></i></a>
      
      </td>
     
    </tr>
   
  </tbody>
</table>
       
       </div>
  
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    
  </body>
</html>
